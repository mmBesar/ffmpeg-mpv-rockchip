name: Build ffmpeg + mpv (RK3588 HWA)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      already_built: ${{ steps.check.outputs.already_built }}
      build_key: ${{ steps.check.outputs.build_key }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Resolve build key and check git tag ledger
        id: check
        run: |
          MAIN_SHA=$(git rev-parse --short HEAD)
          BUILD_KEY="${MAIN_SHA}"
          echo "build_key=${BUILD_KEY}" >> "$GITHUB_OUTPUT"
          if git ls-remote origin "refs/tags/built/${BUILD_KEY}" | grep -q .; then
            echo "already_built=true" >> "$GITHUB_OUTPUT"
            echo "Tag built/${BUILD_KEY} exists -- skipping."
          else
            echo "already_built=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: [check]
    if: needs.check.outputs.already_built == 'false'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            meson ninja-build pkg-config cmake \
            yasm nasm checkinstall \
            libdrm-dev libva-dev libvulkan-dev libplacebo-dev liblua5.2-dev libdisplay-info-dev wayland-protocols \
            libx11-dev libegl1-mesa-dev libgbm-dev \
            libdav1d-dev libopus-dev libmp3lame-dev libvpx-dev \
            libx264-dev libx265-dev libaom-dev \
            libass-dev libfreetype-dev libfontconfig-dev \
            libfribidi-dev libharfbuzz-dev \
            libtheora-dev libwebp-dev \
            libzimg-dev libxml2-dev zlib1g-dev libssl-dev \
            libbluray-dev libopenmpt-dev libchromaprint-dev \
            libfftw3-dev libzvbi-dev libsoxr-dev \
            liblzma-dev libbz2-dev libsnappy-dev libgmp-dev libgnutls28-dev \
            libwayland-dev libxpresent-dev libxext-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev

      - name: Build MPP (Jellyfin fork)
        run: |
          rm -rf /tmp/rkmpp
          git clone --depth 1 --branch jellyfin-mpp-next \
            https://github.com/nyanmisaka/rk-mirrors.git /tmp/rkmpp
          cd /tmp/rkmpp
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TEST=OFF -DBUILD_SHARED_LIBS=ON ..
          make -j$(nproc)
          sudo make install
          echo "Libs.private: -lstdc++" | \
            sudo tee -a /usr/lib/aarch64-linux-gnu/pkgconfig/rockchip_mpp.pc

      - name: Build RGA (Jellyfin fork)
        run: |
          rm -rf /tmp/rkrga
          git clone --depth 1 --branch jellyfin-rga-next \
            https://github.com/nyanmisaka/rk-mirrors.git /tmp/rkrga
          cd /tmp/rkrga
          sed -i 's/shared_library/library/g' meson.build
          mkdir -p build && cd build
          meson setup --prefix=/usr --buildtype=release \
            -Dlibdrm=false -Dlibrga_demo=false ..
          ninja -j$(nproc)
          sudo ninja install
          echo "Libs.private: -lstdc++" | \
            sudo tee -a /usr/lib/aarch64-linux-gnu/pkgconfig/librga.pc

      - name: Build ffmpeg
        run: |
          rm -rf /tmp/ffmpeg
          git clone --depth 1 --branch jellyfin \
            https://github.com/jellyfin/jellyfin-ffmpeg.git /tmp/ffmpeg
          cd /tmp/ffmpeg
          while IFS= read -r patch; do
            echo "Applying: $patch"
            patch -p1 --forward < "debian/patches/$patch" || true
          done < debian/patches/series
          ./configure \
            --prefix=/usr/local --extra-version="rockchip-rk3588" \
            --enable-shared --enable-gpl --enable-version3 \
            --disable-unstable --disable-ffplay \
            --disable-debug --disable-doc --disable-sdl2 \
            --disable-libxcb --disable-xlib \
            --enable-lto=auto --enable-runtime-cpudetect \
            --enable-rkmpp --enable-rkrga \
            --enable-vaapi --disable-vulkan --enable-libdrm \
            --enable-libx264 --enable-libx265 --enable-libaom \
            --enable-libvpx --enable-libdav1d \
            --enable-libopus --enable-libmp3lame \
            --enable-libtheora --enable-libwebp --enable-libzimg \
            --enable-libass --enable-libfreetype \
            --enable-libfontconfig --enable-libfribidi \
            --enable-libbluray --enable-libopenmpt \
            --enable-libsoxr --enable-libzvbi \
            --enable-openssl --enable-libxml2 --enable-libsnappy \
            --enable-bzlib --enable-lzma --enable-zlib
          make -j$(nproc)
          sudo make install

      - name: Package ffmpeg .deb
        run: |
          mkdir -p /tmp/artifacts
          cd /tmp/ffmpeg
          sudo make install DESTDIR=/tmp/ffmpeg-deb
          sudo mkdir -p /tmp/ffmpeg-deb/DEBIAN
          cat <<'CONTROL' | sudo tee /tmp/ffmpeg-deb/DEBIAN/control > /dev/null
          Package: ffmpeg-rockchip
          Version: 8.1.1
          Section: video
          Priority: optional
          Architecture: arm64
          Depends: libdrm2, libva2, libvulkan1, libx264-164, libx265-209, libvpx9, libdav1d7, libaom3, libopus0, libmp3lame0, libass9, libfreetype6, libfontconfig1, libfribidi0, libtheora0, libwebp7, libzimg2, libbluray2, libopenmpt0, libsoxr0, libzvbi0, libssl3, libxml2, libsnappy1v5, liblzma5, libbz2-1.0, zlib1g
          Maintainer: ffmpeg-rockchip
          Description: FFmpeg 8.1 with RK3588 hardware acceleration (rkmpp, rkrga, vaapi)
          CONTROL
          sudo chown -R root:root /tmp/ffmpeg-deb
          sudo dpkg-deb --build /tmp/ffmpeg-deb /tmp/artifacts/ffmpeg-rockchip_8.1.1_arm64.deb

      - name: Build mpv
        run: |
          rm -rf /tmp/mpv
          git init /tmp/mpv && cd /tmp/mpv
          git remote add origin https://github.com/mpv-player/mpv.git
          git fetch --depth 1 origin v0.40.0
          git checkout FETCH_HEAD
          meson setup build \
            -Dlibmpv=true -Dcplayer=true \
            -Dlua=enabled \
            -Ddrm=enabled -Degl-drm=enabled \
            -Dx11=enabled -Dwayland=enabled \
            --buildtype=release --prefix=/usr/local
          ninja -C build -j$(nproc)

      - name: Package mpv .deb
        run: |
          cd /tmp/mpv
          sudo DESTDIR=/tmp/mpv-deb ninja -C build install
          sudo mkdir -p /tmp/mpv-deb/DEBIAN
          cat <<'CONTROL' | sudo tee /tmp/mpv-deb/DEBIAN/control > /dev/null
          Package: mpv-rockchip
          Version: 0.40.0
          Section: video
          Priority: optional
          Architecture: arm64
          Depends: ffmpeg-rockchip (= 8.1.1), libdrm2, libva2, libegl1, libwayland-client0, libx11-6
          Maintainer: mpv-rockchip
          Description: mpv v0.40.0 built against ffmpeg-rockchip with rkmpp HW decode
          CONTROL
          sudo chown -R root:root /tmp/mpv-deb
          sudo dpkg-deb --build /tmp/mpv-deb /tmp/artifacts/mpv-rockchip_0.40.0_arm64.deb

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-mpv-rockchip-debs
          path: /tmp/artifacts/*.deb

      - name: Record build with git tag
        if: github.event_name == 'push'
        run: |
          git tag "built/${{ needs.check.outputs.build_key }}"
          git push origin "built/${{ needs.check.outputs.build_key }}"
